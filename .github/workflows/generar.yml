name: Generar Guia de Visita

on:
  push:
    paths:
      - 'data/*.xlsx'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Generar guia
        run: python generar_guia.py
      - name: Publicar guia actualizada
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add guia_visita_611.html
          git diff --staged --quiet || git commit -m 'Guia actualizada automaticamente'
          git push
