name: Generar MAS Analytics + Guia de Visita

on:
  push:
    paths:
      - 'data/*.xlsx'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Generar archivos
        run: python generar_todo.py

      - name: Publicar archivos generados
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add guia_visita_611.html mas_analytics_v9.html
          git diff --staged --quiet || git commit -m 'Archivos actualizados automaticamente'
          git push
