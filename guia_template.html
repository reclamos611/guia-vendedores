<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guia de Visita - 611</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#191d26;--bg4:#1f2432;
  --brd:#252a38;--brd2:#2e3547;
  --tx:#e8ecf8;--tx2:#8b93ac;--tx3:#4d5571;
  --bl:#4f8ef5;--bl-d:#0a1a3a;--bl-l:#a0c0ff;
  --gr:#2dd98a;--gr-d:#062818;--gr-l:#7effc5;
  --am:#f5a623;--am-d:#2a1a00;--am-l:#ffd080;
  --rd:#f54f4f;--rd-d:#2a0808;--rd-l:#ffaaaa;
  --pu:#a57af5;--pu-d:#1a0f35;--pu-l:#d4bcff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Sora',sans-serif;font-size:14px}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.95);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);padding:10px 14px;
  display:flex;align-items:center;gap:10px}
.logo-pill{background:var(--bl-d);border:1px solid var(--bl);border-radius:20px;
  padding:3px 10px;font-size:10px;color:var(--bl-l);font-weight:600;
  white-space:nowrap;font-family:'DM Mono',monospace}
.tb-title{font-size:14px;font-weight:700;flex:1}
.tb-right{text-align:right}
.tb-vend{font-size:11px;color:var(--bl-l);font-weight:600;font-family:'DM Mono',monospace}
.tb-date{font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace}

/* VISTAS */
.vista{display:none;min-height:100vh;padding-bottom:80px}
.vista.activa{display:block}

/* ── LOGIN ── */
#v-login{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 20px;min-height:100vh}
.login-box{width:100%;max-width:320px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;border-radius:18px;background:var(--bl-d);
  border:1.5px solid var(--bl);margin-bottom:12px;font-size:26px}
.login-titulo{font-size:22px;font-weight:700}
.login-sub{font-size:11px;color:var(--tx3);margin-top:4px;font-family:'DM Mono',monospace}
.login-form{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:22px}
.campo-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:5px;font-family:'DM Mono',monospace}
.campo-input{width:100%;background:var(--bg3);border:1.5px solid var(--brd2);
  color:var(--tx);padding:12px 14px;border-radius:10px;font-size:17px;
  font-family:'DM Mono',monospace;outline:none;transition:border-color .15s;margin-bottom:14px}
.campo-input:focus{border-color:var(--bl)}
.btn-login{width:100%;padding:14px;background:var(--bl);border:none;border-radius:10px;
  color:#fff;font-size:15px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer}
.login-error{display:none;color:var(--rd-l);font-size:12px;background:var(--rd-d);
  border:1px solid var(--rd);border-radius:8px;padding:8px 12px;margin-bottom:12px;text-align:center}
.login-hint{text-align:center;margin-top:14px;font-size:11px;color:var(--tx3)}

/* ── DASHBOARD ── */
#v-dashboard{padding:12px 14px 80px}
.dash-welcome{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;
  padding:14px;margin-bottom:12px}
.dash-nom{font-size:19px;font-weight:700;margin-bottom:6px}
.dash-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid var(--brd2);
  color:var(--tx2);background:var(--bg3)}
.pill-bl{background:var(--bl-d);border-color:var(--bl);color:var(--bl-l)}
.pill-gr{background:var(--gr-d);border-color:var(--gr);color:var(--gr-l)}
.pill-am{background:var(--am-d);border-color:var(--am);color:var(--am-l)}
.pill-rd{background:var(--rd-d);border-color:var(--rd);color:var(--rd-l)}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:12px}
.kpi-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.kpi-sub{font-size:10px;color:var(--tx3);margin-top:3px}

.cob-section{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;
  padding:12px;margin-bottom:12px}
.sec-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.cob-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cob-bar-mk{font-size:11px;font-weight:600;min-width:60px}
.cob-bar-track{flex:1;background:var(--bg4);border-radius:3px;height:6px;overflow:hidden}
.cob-bar-fill{height:100%;border-radius:3px}
.cob-bar-pct{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;min-width:30px;text-align:right}

.btn-buscar{width:100%;padding:15px;background:var(--bl);border:none;border-radius:12px;
  color:#fff;font-size:15px;font-weight:600;font-family:'Sora',sans-serif;
  cursor:pointer;margin-bottom:8px}
.btn-sec{width:100%;padding:11px;background:none;border:1px solid var(--brd2);
  border-radius:10px;color:var(--tx3);font-size:13px;font-family:'Sora',sans-serif;cursor:pointer}

/* ── BUSQUEDA ── */
#v-busqueda{padding:10px 14px 80px}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 0 10px;
  color:var(--tx2);font-size:12px;cursor:pointer;background:none;border:none;
  font-family:'Sora',sans-serif}
.search-input{width:100%;background:var(--bg2);border:1.5px solid var(--brd2);
  border-radius:12px;padding:12px 14px;font-size:15px;color:var(--tx);
  font-family:'Sora',sans-serif;outline:none;transition:border-color .15s;margin-bottom:10px}
.search-input:focus{border-color:var(--bl)}
.search-results{display:flex;flex-direction:column;gap:6px}
.result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--bg2);border:1px solid var(--brd);border-radius:10px;cursor:pointer}
.result-item:active{background:var(--bg3)}
.ri-cod{font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace;min-width:38px}
.ri-nom{font-size:13px;font-weight:500;flex:1}
.ri-loc{font-size:11px;color:var(--tx3)}
.ri-cob{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;
  font-family:'DM Mono',monospace}
.cob-ok{background:var(--gr-d);color:var(--gr-l)}
.cob-med{background:var(--am-d);color:var(--am-l)}
.cob-bad{background:var(--rd-d);color:var(--rd-l)}

/* ── FICHA CLIENTE ── */
#v-ficha{padding:0 0 80px}
.ficha-topbar{padding:10px 14px;display:flex;align-items:center;gap:8px}
.back-ficha{background:none;border:1px solid var(--brd2);border-radius:8px;
  padding:6px 12px;color:var(--tx2);font-size:12px;font-family:'Sora',sans-serif;cursor:pointer}

/* Alerta zona */
.zona-alerta{margin:0 14px 10px;padding:10px 14px;border-radius:10px;
  display:flex;align-items:flex-start;gap:8px}
.zona-warn{background:var(--am-d);border:1px solid var(--am);color:var(--am-l)}
.zona-ok{background:var(--gr-d);border:1px solid var(--gr);color:var(--gr-l)}
.zona-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.zona-txt{font-size:12px;line-height:1.5;font-weight:500}

/* Header cliente */
.cli-head{margin:0 14px 10px;background:var(--bg2);border:1px solid var(--brd);
  border-radius:12px;padding:14px}
.cli-nom{font-size:17px;font-weight:700;margin-bottom:3px}
.cli-dir{font-size:11px;color:var(--tx2);margin-bottom:8px}
.cli-pills{display:flex;gap:6px;flex-wrap:wrap}

/* KPIs cliente */
.cli-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px}

/* Sección de marcas - NUEVO DISEÑO VERTICAL */
.seccion{margin:0 14px 10px}
.seccion-titulo{font-size:10px;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.07em;font-weight:600;margin-bottom:8px}

/* Tarjeta de marca */
.marca-card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;
  margin-bottom:6px;overflow:hidden}
.marca-card.ok{border-left:3px solid var(--gr)}
.marca-card.falta{border-left:3px solid var(--rd)}
.marca-card.cerca{border-left:3px solid var(--am)}

.marca-header{display:flex;align-items:center;padding:10px 12px;gap:10px}
.marca-nombre{font-size:13px;font-weight:700;flex:1}
.marca-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;
  font-family:'DM Mono',monospace}
.bdg-ok{background:var(--gr-d);color:var(--gr-l)}
.bdg-falta{background:var(--rd-d);color:var(--rd-l)}
.bdg-cerca{background:var(--am-d);color:var(--am-l)}

.marca-datos{display:flex;border-top:1px solid var(--brd);
  divide-x:var(--brd)}
.marca-dato{flex:1;padding:7px 10px;text-align:center;border-right:1px solid var(--brd)}
.marca-dato:last-child{border-right:none}
.dato-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:3px}
.dato-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace}
.dato-val.verde{color:var(--gr-l)}
.dato-val.rojo{color:var(--rd-l)}
.dato-val.amarillo{color:var(--am-l)}
.dato-val.gris{color:var(--tx3)}
.dato-val.azul{color:var(--bl-l)}

/* Pedido sugerido */
.pedido-card{background:var(--bg2);border:1px solid var(--brd);
  border-radius:10px;margin-bottom:6px;padding:10px 12px;
  display:flex;align-items:center;gap:10px}
.pedido-mk{font-size:13px;font-weight:700;flex:1}
.pedido-vals{display:flex;gap:10px}
.pedido-dato{text-align:center}
.pedido-num{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;display:block}
.pedido-sub{font-size:9px;color:var(--tx3);display:block}

/* Proveedor card */
.prov-card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;
  margin-bottom:6px;overflow:hidden}
.prov-card.activo{border-left:3px solid var(--gr)}
.prov-card.inactivo{border-left:3px solid var(--rd)}
.prov-card.nunca{border-left:3px solid var(--brd)}

.prov-header{display:flex;align-items:center;padding:10px 12px;gap:10px}
.prov-nombre{font-size:12px;font-weight:600;flex:1}
.prov-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;
  font-family:'DM Mono',monospace}
.prov-datos{display:flex;border-top:1px solid var(--brd)}
.prov-dato{flex:1;padding:7px 10px;text-align:center;border-right:1px solid var(--brd)}
.prov-dato:last-child{border-right:none}

/* EMPTY */
.empty{padding:40px 20px;text-align:center}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-tit{font-size:15px;font-weight:600;margin-bottom:5px}
.empty-desc{font-size:12px;color:var(--tx3);line-height:1.6}

.mono{font-family:'DM Mono',monospace}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-pill">611 PEP</div>
  <div class="tb-title">Guia de Visita</div>
  <div class="tb-right">
    <div class="tb-vend" id="tb-vend" style="display:none"></div>
    <div class="tb-date" id="tb-fecha"></div>
  </div>
</div>

<!-- V1: LOGIN -->
<div id="v-login" class="vista activa">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">📦</div>
      <div class="login-titulo">Guia de Visita</div>
      <div class="login-sub">611 Logistica · PepsiCo</div>
    </div>
    <div class="login-form">
      <div class="campo-lbl">Numero de vendedor</div>
      <input type="number" id="inp-vend" class="campo-input" placeholder="Ej: 51"
        inputmode="numeric"
        onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()">
      <div class="campo-lbl">Contrasena</div>
      <input type="password" id="inp-pass" class="campo-input" placeholder="****"
        inputmode="numeric"
        onkeydown="if(event.key==='Enter')doLogin()">
      <div class="login-error" id="login-err"></div>
      <button class="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
    <div class="login-hint">Contrasena: tu numero repetido dos veces</div>
  </div>
</div>

<!-- V2: DASHBOARD -->
<div id="v-dashboard" class="vista">
  <div class="dash-welcome">
    <div class="dash-nom" id="dash-nom"></div>
    <div class="dash-pills" id="dash-pills"></div>
  </div>
  <div class="kpi-grid" id="dash-kpis"></div>
  <div class="cob-section">
    <div class="sec-lbl">Cobertura de tus clientes (mes anterior)</div>
    <div id="dash-cob"></div>
  </div>
  <button class="btn-buscar" onclick="irBusqueda()">Buscar cliente</button>
  <button class="btn-sec" onclick="doLogout()">Cerrar sesion</button>
</div>

<!-- V3: BUSQUEDA -->
<div id="v-busqueda" class="vista">
  <button class="back-btn" onclick="irDashboard()">&#8592; Inicio</button>
  <div style="font-size:11px;color:var(--tx2);margin-bottom:8px" id="busq-vend-lbl"></div>
  <input type="search" id="busq-input" class="search-input"
    placeholder="Codigo o nombre del cliente..."
    oninput="buscar(this.value)" autocomplete="off">
  <div class="search-results" id="busq-results">
    <div class="empty">
      <div class="empty-ico">🔍</div>
      <div class="empty-tit">Busca un cliente</div>
      <div class="empty-desc">Ingresa el codigo o nombre</div>
    </div>
  </div>
</div>

<!-- V4: FICHA CLIENTE -->
<div id="v-ficha" class="vista">
  <div class="ficha-topbar">
    <button class="back-ficha" onclick="irBusqueda()">&#8592; Busqueda</button>
    <button class="back-ficha" onclick="irDashboard()" style="margin-left:auto">Inicio</button>
  </div>
  <div id="ficha-alerta-zona"></div>
  <div class="cli-head" id="ficha-head"></div>
  <div class="cli-kpis" id="ficha-kpis"></div>

  <div class="seccion">
    <div class="seccion-titulo">PepsiCo - Marcas</div>
    <div id="ficha-marcas"></div>
  </div>

  <div class="seccion" id="seccion-pedido" style="display:none">
    <div class="seccion-titulo">Pedido sugerido (marcas sin cobertura)</div>
    <div id="ficha-pedido"></div>
  </div>

  <div class="seccion">
    <div class="seccion-titulo">Otros proveedores</div>
    <div id="ficha-provs"></div>
  </div>
</div>

<script>
// -- CONSTANTES ------------------------------------------------------------
var MARCAS = ['Lays','Doritos','Cheetos','3D','Pep','Pehuamar','Twistos','Tostitos','Quaker'];
var MK_COLORS = {Lays:'#f5e642',Doritos:'#f5a623',Cheetos:'#f57d23','3D':'#a57af5',
  Pep:'#4f8ef5',Pehuamar:'#2dd98a',Twistos:'#f54f7d',Tostitos:'#f5c842',Quaker:'#c07af5'};
var PROV_COLORS = ['#4d8ef0','#f0a500','#2ecc8a','#a07cf0','#f04d4d','#f57d23',
  '#4dcef0','#c07af5','#f5c842','#888780','#f54f7d','#2dd98a','#ffd080','#a0c0ff'];
var DIAS_SEM = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
var VEND_NOMBRES = {
  31:'VILLALBA MAX.',32:'OLIVARES EDGAR',33:'ORDOEZ ISMAEL',34:'BALDO JULIAN',
  35:'BAZAN LUCIANO',36:'NEIRA NAHUEL',37:'SCORRANI IGN.',38:'MARTINEZ MAU.',
  39:'MERLO SEBASTIAN',41:'CISTERNA DIEGO',42:'RESTIVO VALERIA',43:'RUEDA CUJAR',
  44:'BERNAHOLA AGU.',45:'ROMERO DIANA',46:'OCHOA ROXANA',47:'CACERES YANINA',
  48:'SALDE MARCELA',49:'MOREIRA TOBIAS',51:'GONZALEZ CAND.',52:'MARTINEZ DIEGO',
  53:'CARRIZO EZE.',54:'MORENO JOHAN',55:'PULIDO EFRAIM',56:'RIVARA LORENZO',
  57:'DIAZ OMAR',58:'GONZALEZ MARC.',59:'AVENDAO SERGIO'
};
var VEND_VALIDOS = [31,32,33,34,35,36,37,38,39,41,42,43,44,45,46,47,48,49,
  51,52,53,54,55,56,57,58,59];
var MESA_COLORS = {300:'#4d8ef0',400:'#2ecc8a',500:'#f0a500',600:'#a07cf0'};

// -- ESTADO ----------------------------------------------------------------
var VEND_ACTIVO = null;
var HOY = new Date();
var HOY_DIA = DIAS_SEM[HOY.getDay()];
var MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

// Fecha en topbar
document.getElementById('tb-fecha').textContent =
  HOY_DIA + ' ' + HOY.getDate() + '/' + MESES[HOY.getMonth()];

// -- UTILS -----------------------------------------------------------------
function fmtN(v){ return Math.round(v||0).toLocaleString('es-AR'); }
function fmtM(v){
  if(!v) return '$0';
  if(v>=1e9) return '$'+(v/1e9).toFixed(1)+'B';
  if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M';
  if(v>=1e3) return '$'+(v/1e3).toFixed(0)+'k';
  return '$'+v;
}
function ir(id){
  ['v-login','v-dashboard','v-busqueda','v-ficha'].forEach(function(v){
    var el = document.getElementById(v);
    if(el) el.classList.remove('activa');
  });
  var target = document.getElementById(id);
  if(target){ target.classList.add('activa'); window.scrollTo(0,0); }
}

// -- LOGIN -----------------------------------------------------------------
function doLogin(){
  var vend = parseInt(document.getElementById('inp-vend').value||'0');
  var pass = document.getElementById('inp-pass').value.trim();
  var errEl = document.getElementById('login-err');
  if(!vend || VEND_VALIDOS.indexOf(vend)<0){
    errEl.textContent='Numero de vendedor invalido'; errEl.style.display='block'; return;
  }
  if(pass !== String(vend)+String(vend)){
    errEl.textContent='Contrasena incorrecta'; errEl.style.display='block'; return;
  }
  errEl.style.display='none';
  VEND_ACTIVO = vend;
  var tbV = document.getElementById('tb-vend');
  tbV.textContent = VEND_NOMBRES[vend]||'V'+vend;
  tbV.style.display='block';
  renderDashboard();
  ir('v-dashboard');
}

function doLogout(){
  VEND_ACTIVO=null;
  document.getElementById('tb-vend').style.display='none';
  document.getElementById('inp-vend').value='';
  document.getElementById('inp-pass').value='';
  ir('v-login');
}

// -- DASHBOARD -------------------------------------------------------------
function renderDashboard(){
  var v = VEND_ACTIVO;
  var nom = VEND_NOMBRES[v]||'V'+v;
  var s = (typeof VEND_STATS!=='undefined'&&VEND_STATS[String(v)])||null;
  var mesa=0;
  if(typeof GUIA_DATA!=='undefined'){
    for(var cid in GUIA_DATA){ if(GUIA_DATA[cid].v===v){mesa=GUIA_DATA[cid].m;break;} }
  }
  var mc = MESA_COLORS[mesa]||'#888';

  document.getElementById('dash-nom').textContent = nom;
  document.getElementById('dash-pills').innerHTML =
    '<span class="pill pill-bl">Mesa '+mesa+'</span>' +
    '<span class="pill">V'+v+'</span>' +
    '<span class="pill">'+HOY_DIA+'</span>';

  if(s){
    document.getElementById('dash-kpis').innerHTML = [
      {lbl:'Cartera',val:fmtN(s.cart),sub:'clientes asignados',col:'var(--bl-l)'},
      {lbl:'CCC mes ant.',val:s.pcc_m+'%',sub:fmtN(s.ccc_m)+' clientes',col:s.pcc_m>=60?'var(--gr-l)':s.pcc_m>=40?'var(--am-l)':'var(--rd-l)'},
      {lbl:'CCC mes act.',val:s.pcc_a+'%',sub:fmtN(s.ccc_a)+' clientes',col:s.pcc_a>=20?'var(--gr-l)':s.pcc_a>=10?'var(--am-l)':'var(--rd-l)'},
      {lbl:'Cob. completa',val:fmtN(s.cob9),sub:'con 9 marcas',col:'var(--pu-l)'},
    ].map(function(k){
      return '<div class="kpi-card"><div class="kpi-lbl">'+k.lbl+'</div>'+
        '<div class="kpi-val" style="color:'+k.col+'">'+k.val+'</div>'+
        '<div class="kpi-sub">'+k.sub+'</div></div>';
    }).join('');
  }

  // Cobertura por marca
  var mkCob=[0,0,0,0,0,0,0,0,0], totCli=0;
  if(typeof GUIA_DATA!=='undefined'){
    for(var cid2 in GUIA_DATA){
      var d2=GUIA_DATA[cid2];
      if(d2.v!==v) continue;
      totCli++;
      for(var mi=0;mi<9;mi++){ if(d2.u[mi]>=3) mkCob[mi]++; }
    }
  }
  var cobHtml='';
  for(var mi=0;mi<MARCAS.length;mi++){
    var pct=totCli?Math.round(mkCob[mi]/totCli*100):0;
    var col=pct>=70?'var(--gr)':pct>=50?'var(--am)':'var(--rd)';
    cobHtml+='<div class="cob-bar-row">'+
      '<div class="cob-bar-mk" style="color:'+MK_COLORS[MARCAS[mi]]+'">'+MARCAS[mi]+'</div>'+
      '<div class="cob-bar-track"><div class="cob-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
      '<div class="cob-bar-pct" style="color:'+col+'">'+pct+'%</div>'+
    '</div>';
  }
  document.getElementById('dash-cob').innerHTML = cobHtml;
}

function irBusqueda(){
  ir('v-busqueda');
  var lbl=document.getElementById('busq-vend-lbl');
  if(lbl) lbl.textContent = VEND_NOMBRES[VEND_ACTIVO]||'';
  setTimeout(function(){ document.getElementById('busq-input').focus(); },100);
}
function irDashboard(){ ir('v-dashboard'); }

// -- BUSQUEDA --------------------------------------------------------------
var searchTimer=null;
function buscar(q){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){ _buscar(q.trim()); },200);
}
function _buscar(q){
  var el=document.getElementById('busq-results');
  if(!q||q.length<2){
    el.innerHTML='<div class="empty"><div class="empty-ico"></div>'+
      '<div class="empty-tit">Busca un cliente</div>'+
      '<div class="empty-desc">Ingresa el codigo o nombre</div></div>';
    return;
  }
  if(typeof GUIA_DATA==='undefined'){
    el.innerHTML='<div class="empty"><div class="empty-tit" style="color:var(--rd-l)">Sin datos</div></div>';
    return;
  }
  var ql=q.toLowerCase(), esNum=/^\d+$/.test(q), results=[];
  for(var cid in GUIA_DATA){
    var d=GUIA_DATA[cid];
    if(d.v!==VEND_ACTIVO) continue;
    if(esNum){ if(cid.startsWith(q)) results.push([cid,d]); }
    else{ if(d.n.toLowerCase().includes(ql)||d.l.toLowerCase().includes(ql)) results.push([cid,d]); }
    if(results.length>=20) break;
  }
  if(!results.length){
    el.innerHTML='<div class="empty"><div class="empty-ico"></div>'+
      '<div class="empty-tit">Sin resultados</div>'+
      '<div class="empty-desc">No se encontro "'+q+'"</div></div>';
    return;
  }
  el.innerHTML=results.map(function(r){
    var cid=r[0], d=r[1];
    var nok=d.u.filter(function(x){return x>=3;}).length;
    var cls=nok>=7?'cob-ok':nok>=5?'cob-med':'cob-bad';
    return '<div class="result-item" onclick="verFicha(\''+cid+'\')">'+
      '<div class="ri-cod mono">#'+cid+'</div>'+
      '<div style="flex:1"><div class="ri-nom">'+d.n+'</div>'+
      '<div class="ri-loc">'+d.l+'</div></div>'+
      '<span class="ri-cob '+cls+'">'+nok+'/9</span>'+
    '</div>';
  }).join('');
}

// -- FICHA CLIENTE ---------------------------------------------------------
function verFicha(cid){
  var d=GUIA_DATA[cid];
  if(!d) return;

  // Alerta zona
  var dias=d.ds||[], diasNom=dias.map(function(x){return x[0];});
  var esHoy=diasNom.indexOf(HOY_DIA)>=0;
  var zonaEl=document.getElementById('ficha-alerta-zona');
  if(!diasNom.length){
    zonaEl.innerHTML='<div class="zona-alerta zona-warn"><div class="zona-icon">!</div>'+
      '<div class="zona-txt">Sin dia de visita asignado</div></div>';
  } else if(!esHoy){
    zonaEl.innerHTML='<div class="zona-alerta zona-warn"><div class="zona-icon">!</div>'+
      '<div class="zona-txt"><strong>FUERA DE ZONA</strong> - Hoy es '+HOY_DIA+'. '+
      'Dia asignado: <strong>'+diasNom.join(' / ')+'</strong></div></div>';
  } else {
    zonaEl.innerHTML='<div class="zona-alerta zona-ok"><div class="zona-icon"></div>'+
      '<div class="zona-txt"><strong>En zona</strong> - Dia de visita asignado.</div></div>';
  }

  // Header
  var vNom=VEND_NOMBRES[d.v]||'V'+d.v;
  document.getElementById('ficha-head').innerHTML=
    '<div class="cli-nom">'+d.n+'</div>'+
    '<div class="cli-dir">'+(d.d||'')+(d.l?'  '+d.l:'')+'</div>'+
    '<div class="cli-pills">'+
    '<span class="pill pill-bl">#'+cid+'</span>'+
    '<span class="pill">'+vNom+'</span>'+
    (diasNom.length?'<span class="pill" style="background:var(--pu-d);border-color:var(--pu);color:var(--pu-l)">'+diasNom.join(' / ')+'</span>':'')+
    '</div>';

  // Datos abril
  var abrUds=(typeof ABR_DATA!=='undefined'&&ABR_DATA[cid])||null;

  // KPIs
  var nOk=0;
  for(var i=0;i<9;i++){
    var ref=abrUds?Math.round(abrUds[i]):Math.round(d.u[i]);
    if(ref>=3) nOk++;
  }
  var cobPct=Math.round(nOk/9*100);
  var colCob=cobPct>=78?'var(--gr-l)':cobPct>=56?'var(--am-l)':'var(--rd-l)';
  document.getElementById('ficha-kpis').innerHTML=
    '<div class="kpi-card">'+
      '<div class="kpi-lbl">Cobertura</div>'+
      '<div class="kpi-val" style="color:'+colCob+'">'+nOk+'/9</div>'+
      '<div class="kpi-sub">'+cobPct+'% de marcas</div>'+
    '</div>'+
    '<div class="kpi-card">'+
      '<div class="kpi-lbl">Importe mes ant.</div>'+
      '<div class="kpi-val" style="font-size:16px">'+fmtM(d.i)+'</div>'+
      '<div class="kpi-sub">PepsiCo</div>'+
    '</div>';

  // Marcas - tarjetas verticales
  var marcasHtml='';
  var faltantes=[];
  for(var mi=0;mi<MARCAS.length;mi++){
    var mk=MARCAS[mi];
    var udsAnt=Math.round(d.u[mi]);
    var udsAct=abrUds?Math.round(abrUds[mi]):0;
    var udsRef=abrUds!==null?udsAct:udsAnt;
    var ok=udsRef>=3;
    var cerca=!ok&&udsRef>0;
    var cardClass=ok?'ok':cerca?'cerca':'falta';
    var badgeClass=ok?'bdg-ok':cerca?'bdg-cerca':'bdg-falta';
    var badgeTxt=ok?'OK':cerca?'Cerca':'Falta';
    var sugMin=ok?0:Math.max(0,3-udsRef);
    var col=MK_COLORS[mk]||'var(--tx)';

    marcasHtml+=
      '<div class="marca-card '+cardClass+'">'+
        '<div class="marca-header">'+
          '<div class="marca-nombre" style="color:'+col+'">'+mk+'</div>'+
          '<span class="marca-badge '+badgeClass+'">'+badgeTxt+'</span>'+
        '</div>'+
        '<div class="marca-datos">'+
          '<div class="marca-dato">'+
            '<div class="dato-lbl">Mes act.</div>'+
            '<div class="dato-val '+(udsAct>0?(ok?'verde':'amarillo'):'gris')+'">'+
              (abrUds!==null?(udsAct>0?udsAct+'u':'-'):'?')+
            '</div>'+
          '</div>'+
          '<div class="marca-dato">'+
            '<div class="dato-lbl">Sugerido</div>'+
            '<div class="dato-val '+(sugMin>0?'amarillo':'gris')+'">'+
              (sugMin>0?'+'+sugMin+'u':'-')+
            '</div>'+
          '</div>'+
          '<div class="marca-dato">'+
            '<div class="dato-lbl">Mes ant.</div>'+
            '<div class="dato-val azul">'+(udsAnt>0?udsAnt+'u':'-')+'</div>'+
          '</div>'+
        '</div>'+
      '</div>';

    if(!ok) faltantes.push({mk:mk,col:col,sugMin:sugMin,udsAct:udsAct,udsAnt:udsAnt});
  }
  document.getElementById('ficha-marcas').innerHTML=marcasHtml;

  // Pedido sugerido
  var pedSec=document.getElementById('seccion-pedido');
  var pedEl=document.getElementById('ficha-pedido');
  if(faltantes.length){
    pedSec.style.display='block';
    pedEl.innerHTML=faltantes.map(function(f){
      return '<div class="pedido-card">'+
        '<div class="pedido-mk" style="color:'+f.col+'">'+f.mk+'</div>'+
        '<div class="pedido-vals">'+
          '<div class="pedido-dato">'+
            '<span class="pedido-num" style="color:var(--am-l)">+'+f.sugMin+'</span>'+
            '<span class="pedido-sub">min.</span>'+
          '</div>'+
          '<div class="pedido-dato">'+
            '<span class="pedido-num" style="color:var(--bl-l)">'+(f.udsAct>0?f.udsAct+' u':'-')+'</span>'+
            '<span class="pedido-sub">mes act.</span>'+
          '</div>'+
          '<div class="pedido-dato">'+
            '<span class="pedido-num" style="color:var(--tx2)">'+(f.udsAnt>0?f.udsAnt+' u':'-')+'</span>'+
            '<span class="pedido-sub">mes ant.</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
  } else {
    pedSec.style.display='none';
  }

  // Otros proveedores
  var provsDet=(typeof OTROS_PROV_DET!=='undefined'&&OTROS_PROV_DET[cid])||{};
  var todosP=typeof TODOS_PROV_ACTIVOS!=='undefined'?TODOS_PROV_ACTIVOS:Object.keys(provsDet);
  var provsHtml='';
  todosP.forEach(function(prov,idx){
    var vals=provsDet[prov]||[0,0,0,0];
    var marU=vals[0]||0, marI=vals[1]||0, actU=vals[2]||0, actI=vals[3]||0;
    var estado, badgeClass, cardClass;
    if(actI>0){ estado='Activo'; badgeClass='bdg-ok'; cardClass='activo'; }
    else if(marI>0){ estado='Inactivo'; badgeClass='bdg-falta'; cardClass='inactivo'; }
    else { estado='Nunca'; badgeClass=''; cardClass='nunca'; }
    var col=PROV_COLORS[idx%PROV_COLORS.length];
    var ofrecer=(marI>0&&actI===0)?(marU>0?'+'+marU:'si'):(actI>0?'OK':'-');
    var ofCol=(marI>0&&actI===0)?'var(--am-l)':(actI>0?'var(--gr-l)':'var(--tx3)');

    provsHtml+=
      '<div class="prov-card '+cardClass+'">'+
        '<div class="prov-header">'+
          '<div class="prov-nombre" style="color:'+col+'">'+prov+'</div>'+
          '<span class="prov-badge '+badgeClass+'" style="'+(badgeClass?'':'background:var(--bg3);color:var(--tx3)')+'">'+estado+'</span>'+
        '</div>'+
        (cardClass!=='nunca'?
          '<div class="prov-datos">'+
            '<div class="prov-dato"><div class="dato-lbl">Mes ant.</div>'+
              '<div class="dato-val azul">'+(marU>0?marU+'u':'-')+'</div></div>'+
            '<div class="prov-dato"><div class="dato-lbl">Mes act.</div>'+
              '<div class="dato-val '+(actU>0?'verde':'gris')+'">'+(actU>0?actU+'u':'-')+'</div></div>'+
            '<div class="prov-dato"><div class="dato-lbl">Ofrecer</div>'+
              '<div class="dato-val" style="color:'+ofCol+'">'+ofrecer+'</div></div>'+
          '</div>':'')+
      '</div>';
  });
  document.getElementById('ficha-provs').innerHTML=provsHtml||
    '<div style="font-size:12px;color:var(--tx3);padding:12px">Sin datos de otros proveedores</div>';

  ir('v-ficha');
}
